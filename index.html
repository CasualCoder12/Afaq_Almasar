      height: 300px;
      background: var(--off-white);
      position: relative;
    }
    .map-container iframe { width: 100%; height: 100%; border: none; }
    .map-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--navy);
      color: var(--white);
      font-size: 0.875rem;
    }
    .map-placeholder .mp-icon { font-size: 2.5rem; }
    .map-placeholder strong { font-size: 1rem; }
    .map-placeholder span { opacity: 0.65; font-size: 0.8rem; }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.75);
      padding: 56px 24px 28px;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      gap: 40px;
      margin-bottom: 48px;
    }
    .footer-brand-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;
    }
    .footer-brand-tag { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .footer-about { font-size: 0.8rem; line-height: 1.7; }
    .footer-col h4 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--white);
      margin-bottom: 16px;
    }
    .footer-links { display: flex; flex-direction: column; gap: 9px; }
    .footer-links button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      text-align: right;
      padding: 0;
      transition: color 0.2s;
    }
    .footer-links button:hover { color: var(--gold); }
    .footer-contact-list { display: flex; flex-direction: column; gap: 10px; }
    .footer-contact-list li { font-size: 0.8rem; display: flex; gap: 8px; align-items: flex-start; }
    .footer-contact-list li span:first-child { opacity: 0.5; flex-shrink: 0; margin-top: 1px; }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-bottom p { font-size: 0.75rem; opacity: 0.5; }
    .footer-reg { font-size: 0.72rem; opacity: 0.4; text-align: left; }

    /* ── INNER PAGE HERO ── */
    .page-hero {
      background: var(--navy);
      color: var(--white);
      padding: 64px 24px;
    }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; }
    .page-hero .ph-eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .page-hero h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
    .page-hero p { font-size: 1rem; color: rgba(255,255,255,0.7); max-width: 540px; line-height: 1.65; }
    .breadcrumb { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-bottom: 16px; }
    .breadcrumb span { color: rgba(255,255,255,0.65); }

    /* ── UTILITY ── */
    .bg-off { background: var(--off-white); }
    .divider { height: 1px; background: var(--border); max-width: 1200px; margin: 0 auto; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-visual { display: none; }
      .overview-grid { grid-template-columns: 1fr; }
      .about-intro { grid-template-columns: 1fr; }
      .mvv-grid { grid-template-columns: 1fr 1fr; }
      .contact-layout { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      nav { display: none; }
      .hamburger { display: flex; }
      .hero { padding: 64px 20px; }
      .section { padding: 60px 20px; }
      .mvv-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; }
      .overview-highlights { grid-template-columns: 1fr; }
      .hero-stat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

&lt;!-- ══════════════════════ ABOUT PAGE ══════════════════════ --&gt;
&lt;div id=&quot;page-about&quot; class=&quot;page&quot;&gt;

  &lt;div class=&quot;page-hero&quot;&gt;
    &lt;div class=&quot;page-hero-inner&quot;&gt;
      &lt;div class=&quot;breadcrumb&quot;&gt;&lt;span onclick=&quot;showPage(&#x27;home&#x27;)&quot; style=&quot;cursor:pointer&quot;&gt;الرئيسية&lt;/span&gt; / من نحن&lt;/div&gt;
      &lt;div class=&quot;ph-eyebrow&quot;&gt;شركتنا&lt;/div&gt;
      &lt;h1&gt;عن آفاق المسار الحديثة&lt;/h1&gt;
      &lt;p&gt;تعرف على خلفية شركتنا، ورسالتنا، وقيمنا، والمبادئ التي توجه عملياتنا التجارية في المملكة العربية السعودية.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- INTRO + INFO BOX --&gt;
  &lt;section class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-inner&quot;&gt;
      &lt;div class=&quot;about-intro&quot;&gt;
        &lt;div class=&quot;about-intro-text&quot;&gt;
          &lt;div class=&quot;section-label&quot;&gt;ملف الشركة&lt;/div&gt;
          &lt;h2 class=&quot;section-title&quot;&gt;منشأة تجارية مهنية في قلب المملكة&lt;/h2&gt;
          &lt;p&gt;شركة آفاق المسار الحديثة للتجارة ذ.م.م هي شركة سعودية ذات مسؤولية محدودة تأسست وتعمل في المدينة المنورة. تأسست الشركة في عام 2026 للمشاركة الفعالة في المشهد التجاري المتنامي بالمملكة من خلال التجارة العامة ومجموعة واسعة من خدمات المشتريات والتوريد.&lt;/p&gt;
          &lt;p&gt;يعكس اسم الشركة &quot;آفاق المسار الحديثة&quot; نهجنا التطلعي في العمل: تبني الممارسات التجارية الحديثة، والمعايير الأخلاقية، وتقديم الخدمات المهنية لبناء منشأة تجارية مستدامة تساهم في النمو الاقتصادي للمملكة العربية السعودية.&lt;/p&gt;
          &lt;p&gt;باعتبارها شركة الشخص الواحد (منشأة ذات هيكل ذ.م.م)، تعمل آفاق المسار الحديثة بتركيز ومرونة عالية، مما يسمح باتخاذ القرارات السريعة، وتقديم خدمة مخصصة، وعلاقة عمل وثيقة مع كل عميل ومورد. هيكلنا المرن مدعوم بمعرفة تجارية واسعة والتزام بالتميز التشغيلي.&lt;/p&gt;
          &lt;p&gt;نحن نخدم قاعدة عملاء متنوعة تشمل الشركات التي تبحث عن موردي الجملة، والشركات التي تتطلب دعماً في المشتريات، والموزعين الذين يبحثون عن مصادر للمنتجات، والشركاء المهتمين بترتيبات تجارية تعاونية داخل المملكة العربية السعودية وخارجها.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div&gt;
          &lt;div class=&quot;about-info-box&quot;&gt;
            &lt;h3&gt;تفاصيل السجل التجاري للشركة&lt;/h3&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;اسم الشركة&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;شركة آفاق المسار الحديثة للتجارة ذ.م.م&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;الاسم بالكامل&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;آفاق المسار الحديثة&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;النوع القانوني&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;شركة ذات مسؤولية محدودة (ذ.م.م)&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;هيكل الشركة&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;شركة الشخص الواحد&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;الرقم الوطني الموحد&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;7054640318&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;تاريخ إصدار السجل&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;24-06-2026&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;تاريخ تأكيد السجل&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;23-06-2027&lt;/span&gt;
            &lt;/div&gt;
            &lt;div class=&quot;info-row&quot;&gt;
              &lt;span class=&quot;ir-label&quot;&gt;الموقع&lt;/span&gt;
              &lt;span class=&quot;ir-value&quot;&gt;المدينة المنورة، حي الدار 1، المملكة العربية السعودية&lt;/span&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;div class=&quot;divider&quot;&gt;&lt;/div&gt;

  &lt;!-- MISSION / VISION / COMMITMENT --&gt;
  &lt;section class=&quot;section bg-off&quot;&gt;
    &lt;div class=&quot;section-inner&quot;&gt;
      &lt;div class=&quot;section-header centered&quot;&gt;
        &lt;div class=&quot;section-label&quot;&gt;توجهنا&lt;/div&gt;
        &lt;h2 class=&quot;section-title&quot;&gt;الرسالة والرؤية والالتزام&lt;/h2&gt;
        &lt;p class=&quot;section-subtitle&quot;&gt;ثلاثة ركائز أساسية تحدد كيفية عملنا والوجهة التي نسير نحوها كمنشأة تجارية.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;mvv-grid&quot;&gt;
        &lt;div class=&quot;mvv-card&quot;&gt;
          &lt;div class=&quot;mvv-icon&quot;&gt;🎯&lt;/div&gt;
          &lt;div class=&quot;mvv-title&quot;&gt;رسالتنا&lt;/div&gt;
          &lt;div class=&quot;mvv-text&quot;&gt;تقديم خدمات تجارية ومشتريات موثوقة واحترافية وفعالة تخلق قيمة حقيقية لعملائنا وموردينا وشركائنا. نهدف إلى سد الفجوات في السوق، وتبسيط سلاسل الإمداد المعقدة، وتقديم منتجات عالية الجودة من خلال ممارسات تجارية أخلاقية وشفافة تحافظ على أعلى المعايير التجارية.&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;mvv-card&quot;&gt;
          &lt;div class=&quot;mvv-icon&quot;&gt;🔭&lt;/div&gt;
          &lt;div class=&quot;mvv-title&quot;&gt;رؤيتنا&lt;/div&gt;
          &lt;div class=&quot;mvv-text&quot;&gt;أن نصبح اسماً بارزاً وموثوقاً في قطاع التجارة العامة في المملكة العربية السعودية — شركة معروفة بالاحترافية والموثوقية والقدرة على ربط الأسواق بدقة متناهية. نتطلع إلى منشأة متنامية توسع خدماتها وتعمق شراكاتها وتساهم بشكل هادف في أهداف التنوع الاقتصادي لرؤية السعودية 2030.&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;mvv-card&quot;&gt;
          &lt;div class=&quot;mvv-icon&quot;&gt;🏆&lt;/div&gt;
          &lt;div class=&quot;mvv-title&quot;&gt;الالتزام بالتميز&lt;/div&gt;
          &lt;div class=&quot;mvv-text&quot;&gt;التميز ليس مجرد هدف بل هو معيار عملنا. إن كل خدمة نقدمها، وكل شحنة ننسقها، وكل علاقة عميل نديرها، نوليها اهتماماً فائقاً بالتفاصيل وعزيمة راسخة لتجاوز التوقعات. نحن نستثمر باستمرار في تحسين عملياتنا وتوسيع شبكات الموردين لدينا ورفع جودة خدماتنا.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;!-- CORE VALUES --&gt;
  &lt;section class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-inner&quot;&gt;
      &lt;div class=&quot;section-header&quot;&gt;
        &lt;div class=&quot;section-label&quot;&gt;مبادئنا&lt;/div&gt;
        &lt;h2 class=&quot;section-title&quot;&gt;القيم الأساسية&lt;/h2&gt;
        &lt;p class=&quot;section-subtitle&quot;&gt;القيم التي تشكل ثقافتنا، وتوجه قراراتنا، وتحدد هويتنا وأسلوب عملنا كشركة.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;values-grid&quot;&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;🤝&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;الثقة والنزاهة&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;⚡&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;الكفاءة التشغيلية&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;🌟&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;الالتزام بالجودة&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;🔐&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;الشفافية المطلقة&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;👥&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;خدمة تتمحور حول العميل&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;📈&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;التحسين المستمر&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;🌍&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;منظور عالمي&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;value-pill&quot;&gt;&lt;div class=&quot;vp-icon&quot;&gt;⚖️&lt;/div&gt;&lt;div class=&quot;vp-text&quot;&gt;السلوك التجاري الأخلاقي&lt;/div&gt;&lt;/div&gt;
      &lt;/div&gt;

  &lt;/section&gt;

  &lt;!-- BUSINESS OBJECTIVES --&gt;
  &lt;section class=&quot;section bg-off&quot;&gt;
    &lt;div class=&quot;section-inner&quot;&gt;
      &lt;div class=&quot;section-header&quot;&gt;
        &lt;div class=&quot;section-label&quot;&gt;خارطة طريقنا&lt;/div&gt;
        &lt;h2 class=&quot;section-title&quot;&gt;أهداف العمل&lt;/h2&gt;
        &lt;p class=&quot;section-subtitle&quot;&gt;أهداف واضحة ومحددة توجه استراتيجية عملنا ونمونا التجاري.&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;objectives-list&quot;&gt;
        &lt;div class=&quot;objective-item&quot;&gt;
          &lt;div class=&quot;obj-marker&quot;&gt;أ&lt;/div&gt;
          &lt;div class=&quot;obj-content&quot;&gt;
            &lt;h4&gt;ترسيخ حضور قوي في السوق السعودي&lt;/h4&gt;
            &lt;p&gt;بناء سمعة متميزة كشركة تجارية موثوقة ومحترفة في المدينة المنورة وفي جميع أنحاء المملكة من خلال تقديم خدمات عالية الجودة باستمرار والحفاظ على علاقات عمل قوية.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;objective-item&quot;&gt;
          &lt;div class=&quot;obj-marker&quot;&gt;ب&lt;/div&gt;
          &lt;div class=&quot;obj-content&quot;&gt;
            &lt;h4&gt;توسيع شبكات الموردين والشركاء&lt;/h4&gt;
            &lt;p&gt;تطوير وتنويع شبكتنا من الموردين المحليين والدوليين، والمصنعين، والشركاء التجاريين بشكل مستمر لزيادة نطاق وعمق المنتجات والخدمات التي يمكننا تقديمها للعملاء.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;objective-item&quot;&gt;
          &lt;div class=&quot;obj-marker&quot;&gt;ج&lt;/div&gt;
          &lt;div class=&quot;obj-content&quot;&gt;
            &lt;h4&gt;تحقيق رضا العملاء المستمر&lt;/h4&gt;
            &lt;p&gt;الحفاظ على مستويات عالية من رضا العملاء من خلال التواصل الاستباقي، وتلبية الطلبات بدقة، والتسليم في الوقت المحدد، وتقديم دعم ما بعد البيع السريع الذي يبني ولاءً طويل الأمد مع العميل.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;objective-item&quot;&gt;
          &lt;div class=&quot;obj-marker&quot;&gt;د&lt;/div&gt;
          &lt;div class=&quot;obj-content&quot;&gt;
            &lt;h4&gt;ضمان الامتثال التنظيمي الكامل&lt;/h4&gt;
            &lt;p&gt;العمل بامتثال تام للأنظمة التجارية المعمول بها في المملكة العربية السعودية، وقوانين الاستيراد والتصدير، ومتطلبات الترخيص التجاري — لضمان بيئة عمل آمنة وموثوقة لجميع الأطراف المعنية.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;objective-item&quot;&gt;
          &lt;div class=&quot;obj-marker&quot;&gt;هـ&lt;/div&gt;
          &lt;div class=&quot;obj-content&quot;&gt;
            &lt;h4&gt;دعم مستهدفات رؤية المملكة 2030&lt;/h4&gt;
            &lt;p&gt;مواءمة الأنشطة التجارية مع الأهداف الاستراتيجية للمملكة في التنويع الاقتصادي، ودعم التجارة المحلية، وزيادة كفاءة التبادل التجاري، والمساهمة في تطوير منظومة القطاع الخاص الوطني.&lt;/p&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;cta-banner&quot;&gt;
    &lt;h2&gt;هل تود العمل معنا؟&lt;/h2&gt;
    &lt;p&gt;اتصل بفريقنا لمناقشة كيف يمكن لشركة آفاق المسار الحديثة دعم احتياجاتك التجارية والتموينية.&lt;/p&gt;
    &lt;button class=&quot;btn-white&quot; onclick=&quot;showPage(&#x27;contact&#x27;)&quot;&gt;تواصل معنا اليوم&lt;/button&gt;
  &lt;/section&gt;

&lt;/div&gt;

&lt;!-- ══════════════════════ CONTACT PAGE ══════════════════════ --&gt;
&lt;div id=&quot;page-contact&quot; class=&quot;page&quot;&gt;

  &lt;div class=&quot;page-hero&quot;&gt;
    &lt;div class=&quot;page-hero-inner&quot;&gt;
      &lt;div class=&quot;breadcrumb&quot;&gt;&lt;span onclick=&quot;showPage(&#x27;home&#x27;)&quot; style=&quot;cursor:pointer&quot;&gt;الرئيسية&lt;/span&gt; / الاتصال&lt;/div&gt;
      &lt;div class=&quot;ph-eyebrow&quot;&gt;تواصل معنا&lt;/div&gt;
      &lt;h1&gt;اتصل بنا&lt;/h1&gt;
      &lt;p&gt;نرحب بجميع الاستفسارات المتعلقة بعمليات التجزئة التي تركز على العملاء وأنشطة التجارة الرقمية. أرسل لنا رسالة وسيقوم فريقنا بالرد عليك على الفور.&lt;/p&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;section class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-inner&quot;&gt;
      &lt;div class=&quot;contact-layout&quot;&gt;

        &lt;!-- FORM --&gt;
        &lt;div&gt;
          &lt;div class=&quot;section-label&quot;&gt;إرسال استفسار&lt;/div&gt;
          &lt;h2 class=&quot;section-title&quot; style=&quot;margin-bottom:32px;&quot;&gt;نموذج الاستفسار التجاري&lt;/h2&gt;
          &lt;div class=&quot;contact-form-wrap&quot; id=&quot;contactForm&quot;&gt;
            &lt;div class=&quot;form-row&quot;&gt;
              &lt;div class=&quot;form-group&quot;&gt;
                &lt;label for=&quot;fname&quot;&gt;الاسم الكامل *&lt;/label&gt;
                &lt;input type=&quot;text&quot; id=&quot;fname&quot; placeholder=&quot;اسمك الكامل&quot; /&gt;
              &lt;/div&gt;
              &lt;div class=&quot;form-group&quot;&gt;
                &lt;label for=&quot;femail&quot;&gt;البريد الإلكتروني *&lt;/label&gt;
                &lt;input type=&quot;email&quot; id=&quot;femail&quot; placeholder=&quot;your@email.com&quot; /&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;form-row&quot;&gt;
              &lt;div class=&quot;form-group&quot;&gt;
                &lt;label for=&quot;fphone&quot;&gt;رقم الهاتف&lt;/label&gt;
                &lt;input type=&quot;tel&quot; id=&quot;fphone&quot; placeholder=&quot;+966 XX XXX XXXX&quot; /&gt;
              &lt;/div&gt;
              &lt;div class=&quot;form-group&quot;&gt;
                &lt;label for=&quot;fsubject&quot;&gt;نوع الاستفسار&lt;/label&gt;
                &lt;select id=&quot;fsubject&quot;&gt;
                  &lt;option value=&quot;&quot;&gt;اختر نوع الاستفسار&lt;/option&gt;
                  &lt;option&gt;استفسار تجارة عامة&lt;/option&gt;
                  &lt;option&gt;استيراد / تصدير&lt;/option&gt;
                  &lt;option&gt;تأمين وتوريد منتجات&lt;/option&gt;
                  &lt;option&gt;خدمات المشتريات&lt;/option&gt;
                  &lt;option&gt;جملة / توريد&lt;/option&gt;
                  &lt;option&gt;مقترح شراكة&lt;/option&gt;
                  &lt;option&gt;أخرى&lt;/option&gt;
                &lt;/select&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;form-group&quot;&gt;
              &lt;label for=&quot;fmessage&quot;&gt;الرسالة *&lt;/label&gt;

      gap: 14px;

    .hero-badge-text { font-size: 0.85rem; color: rgba(255,255,255,0.9); line-height: 1.4; }
    .hero-badge-text strong { display: block; color: var(--white); font-size: 0.95rem; margin-bottom: 2px; }

    /* ── SECTION WRAPPER ── */
    .section { padding: 80px 24px; }

    .section-title {

      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 16px;

    .section-subtitle {

      color: var(--muted);

      line-height: 1.7;

    .section-header.centered .section-subtitle { margin: 0 auto; }

    /* ── OVERVIEW ── */
    .overview { background: var(--off-white); }
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .overview-text p {
      color: var(--slate);
      font-size: 0.975rem;
      line-height: 1.75;
      margin-bottom: 16px;

    .overview-highlights {

      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .highlight-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--teal);
      border-radius: 4px;
      padding: 18px;
    }
    .highlight-card .hc-icon { font-size: 1.6rem; margin-bottom: 10px; }
    .highlight-card .hc-title { font-weight: 600; font-size: 0.9rem; color: var(--navy); margin-bottom: 4px; }
    .highlight-card .hc-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

    /* ── SERVICES ── */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px 28px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .service-card::after {
      content: &#x27;&#x27;;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: var(--teal);
      transform: scaleX(0);
      transition: transform 0.25s;
    }
    .service-card:hover { border-color: var(--teal); transform: translateY(-2px); }
    .service-card:hover::after { transform: scaleX(1); }
    .service-icon { font-size: 2.2rem; margin-bottom: 16px; }
    .service-name { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; color: var(--navy); margin-bottom: 10px; }
    .service-desc { font-size: 0.875rem; color: var(--slate); line-height: 1.65; }

    /* ── WHY US ── */
    .whyus { background: var(--navy); color: var(--white); }
    .whyus .section-title { color: var(--white); }
    .whyus .section-subtitle { color: rgba(255,255,255,0.65); }
    .whyus .section-label { color: var(--gold); }
    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .why-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 28px;
    }
    .why-card .wc-num {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--gold);
      opacity: 0.4;
      line-height: 1;
      margin-bottom: 14px;
    }
    .why-card .wc-title { font-size: 1rem; font-weight: 600; color: var(--white); margin-bottom: 8px; }
    .why-card .wc-desc { font-size: 0.875rem; color: rgba(255,255,255,0.65); line-height: 1.65; }

    /* ── DIVIDER BANNER ── */
    .cta-banner {
      background: var(--teal);
      padding: 60px 24px;
      text-align: center;
      color: var(--white);
    }
    .cta-banner h2 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 2.5vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .cta-banner p { font-size: 1rem; opacity: 0.85; margin-bottom: 28px; }
    .cta-banner .btn-white {
      background: var(--white);
      color: var(--teal);
      padding: 13px 28px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .cta-banner .btn-white:hover { opacity: 0.9; }

    /* ── ABOUT PAGE ── */
    .about-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }
    .about-intro-text p {
      color: var(--slate);
      font-size: 0.975rem;
      line-height: 1.75;
      margin-bottom: 16px;
    }
    .about-intro-text p:last-child { margin-bottom: 0; }
    .about-info-box {
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 28px;
    }
    .about-info-box h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--navy); }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .info-row:last-child { border-bottom: none; }
    .info-row .ir-label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .info-row .ir-value { font-size: 0.875rem; font-weight: 500; color: var(--navy); text-align: right; }
    .mvv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .mvv-card {
      border: 1px solid var(--border);
      border-top: 4px solid var(--navy);
      border-radius: 4px;
      padding: 28px;
    }
    .mvv-card:nth-child(2) { border-top-color: var(--teal); }
    .mvv-card:nth-child(3) { border-top-color: var(--gold); }
    .mvv-icon { font-size: 1.8rem; margin-bottom: 14px; }
    .mvv-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
    .mvv-text { font-size: 0.875rem; color: var(--slate); line-height: 1.7; }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
    .value-pill {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
    }
    .value-pill .vp-icon { font-size: 1.4rem; }
    .value-pill .vp-text { font-size: 0.875rem; font-weight: 600; color: var(--navy); }
    .objectives-list { display: flex; flex-direction: column; gap: 16px; }
    .objective-item {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      padding: 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .obj-marker {
      background: var(--navy);
      color: var(--white);
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .obj-content h4 { font-size: 0.95rem; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
    .obj-content p { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }

    /* ── CONTACT PAGE ── */
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
    }
    .contact-form-wrap { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--navy); letter-spacing: 0.04em; text-transform: uppercase; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--navy);
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 12px 14px;
      transition: border-color 0.2s;
      outline: none;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--navy); }
    .form-group textarea { min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-submit {
      background: var(--navy);
      color: var(--white);
      padding: 14px 32px;
      border: none;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .form-submit:hover { background: var(--navy-mid); }
    .form-success {
      display: none;
      background: #E6F4F1;
      border: 1px solid var(--teal);
      border-radius: 4px;
      padding: 14px 18px;
      color: var(--teal);
      font-size: 0.9rem;
      font-weight: 500;
    }
    .contact-info { display: flex; flex-direction: column; gap: 32px; }
    .contact-info-head { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .contact-info-sub { font-size: 0.875rem; color: var(--muted); }
    .contact-details { display: flex; flex-direction: column; gap: 14px; }
    .contact-detail-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px;
      background: var(--off-white);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .cdi-icon { font-size: 1.3rem; margin-top: 2px; }
    .cdi-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
    .cdi-value { font-size: 0.9rem; color: var(--navy); font-weight: 500; word-break: break-all; }
    .cdi-value a { color: var(--teal); }
    .cdi-value a:hover { text-decoration: underline; }
    .map-container {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      height: 300px;
      background: var(--off-white);
      position: relative;
    }
    .map-container iframe { width: 100%; height: 100%; border: none; }
    .map-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--navy);
      color: var(--white);
      font-size: 0.875rem;
    }
    .map-placeholder .mp-icon { font-size: 2.5rem; }
    .map-placeholder strong { font-size: 1rem; }
    .map-placeholder span { opacity: 0.65; font-size: 0.8rem; }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.75);
      padding: 56px 24px 28px;
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr;
      gap: 40px;
      margin-bottom: 48px;
    }
    .footer-brand-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 4px;

    .footer-about { font-size: 0.8rem; line-height: 1.7; }
    .footer-col h4 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--white);
      margin-bottom: 16px;
    }
    .footer-links { display: flex; flex-direction: column; gap: 9px; }
    .footer-links button {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      text-align: left;
      padding: 0;
      transition: color 0.2s;
    }
    .footer-links button:hover { color: var(--gold); }
    .footer-contact-list { display: flex; flex-direction: column; gap: 10px; }
    .footer-contact-list li { font-size: 0.8rem; display: flex; gap: 8px; align-items: flex-start; }
    .footer-contact-list li span:first-child { opacity: 0.5; flex-shrink: 0; margin-top: 1px; }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-bottom p { font-size: 0.75rem; opacity: 0.5; }
    .footer-reg { font-size: 0.72rem; opacity: 0.4; text-align: right; }

    /* ── INNER PAGE HERO ── */
    .page-hero {
      background: var(--navy);
      color: var(--white);
      padding: 64px 24px;
    }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; }
    .page-hero .ph-eyebrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
    .page-hero h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; }
    .page-hero p { font-size: 1rem; color: rgba(255,255,255,0.7); max-width: 540px; line-height: 1.65; }
    .breadcrumb { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-bottom: 16px; }
    .breadcrumb span { color: rgba(255,255,255,0.65); }

    /* ── UTILITY ── */
    .bg-off { background: var(--off-white); }
    .divider { height: 1px; background: var(--border); max-width: 1200px; margin: 0 auto; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-visual { display: none; }
      .overview-grid { grid-template-columns: 1fr; }
      .about-intro { grid-template-columns: 1fr; }
      .mvv-grid { grid-template-columns: 1fr 1fr; }
      .contact-layout { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      nav { display: none; }
      .hamburger { display: flex; }
      .hero { padding: 64px 20px; }
      .section { padding: 60px 20px; }
      .mvv-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; }
      .overview-highlights { grid-template-columns: 1fr; }
      .hero-stat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }

<script>
let current='ar';
function toggleLang(){
 const ar=document.getElementById('arFrame');
 const en=document.getElementById('enFrame');

 if(current==='ar') {
   ar.style.display='none';
   en.style.display='block';
   document.documentElement.lang='en';
   document.documentElement.dir='ltr';
   document.getElementById('currentLang').textContent='English';
   document.getElementById('toggleText').textContent='العربية';
   current='en';
 } else {
   en.style.display='none';
   ar.style.display='block';
   document.documentElement.lang='ar';
   document.documentElement.dir='rtl';
   document.getElementById('currentLang').textContent='العربية';
   document.getElementById('toggleText').textContent='English';
   current='ar';
 }
}

function syncLanguageUI(){
  const ar=document.getElementById('arFrame');
  const arabicVisible = ar.style.display !== 'none';
  document.getElementById('currentLang').textContent = arabicVisible ? 'العربية' : 'English';
  document.getElementById('toggleText').textContent = arabicVisible ? 'English' : 'العربية';
}
window.addEventListener('load', syncLanguageUI);
</script>
